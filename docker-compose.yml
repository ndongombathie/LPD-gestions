version: "3.9"

services:
  frontend-dev:
    build:
      context: .
      target: dev
    container_name: lpd-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  frontend-prod:
    build:
      context: .
      target: prod
      args:
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_CLUSTER: ${VITE_REVERB_CLUSTER}
        VITE_API_URL: ${VITE_API_URL}
    container_name: lpd-frontend-prod
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  node_modules:
