server {
    listen 80;
    server_name lpdmanager.com www.lpdmanager.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lpdmanager.com www.lpdmanager.com;

    ssl_certificate /etc/letsencrypt/live/lpdmanager.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lpdmanager.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://31.207.36.83:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /app/ {
        proxy_pass http://31.207.36.83:8080/app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
